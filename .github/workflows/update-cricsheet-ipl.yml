name: Update IPL Cricsheet Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download Cricsheet and rebuild IPL stats
        run: bash scripts/update-cricsheet-ipl.sh
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ipl-2026-season-stats.js data/ipl-2026-season-stats.json
          if git diff --cached --quiet; then
            echo "No IPL data changes to commit."
            exit 0
          fi
          git commit -m "Update IPL Cricsheet stats"
          git push
