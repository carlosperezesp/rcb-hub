name: Update WTC Test Data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. These checks are intentionally light:
    # the job only commits when Cricsheet publishes a new/changed Test scorecard.
    - cron: "35 6 * * *"
    - cron: "35 18 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download Cricsheet and rebuild WTC Test data
        run: bash scripts/update-cricsheet-tests.sh
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/wtc-test-data.js
          if git diff --cached --quiet; then
            echo "No WTC Test data changes to commit."
            exit 0
          fi
          git commit -m "Update WTC Test player data"
          git push
