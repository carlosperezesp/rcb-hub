<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCB Fan Hub · IPL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0b;
    --surface:  #141416;
    --surface2: #1c1c1f;
    --border:   #2a2a2f;
    --border2:  #3a3a42;
    --red:      #e8002d;
    --red-dim:  rgba(232,0,45,.12);
    --red-glow: rgba(232,0,45,.35);
    --gold:     #c9a84c;
    --gold-dim: rgba(201,168,76,.12);
    --green:    #22c55e;
    --green-dim:rgba(34,197,94,.13);
    --blue:     #3b82f6;
    --blue-dim: rgba(59,130,246,.13);
    --grey:     #64748b;
    --grey-dim: rgba(100,116,139,.13);
    --text:     #f1f0ed;
    --muted:    #6b7280;
    --win:      #22c55e;
    --loss:     #e8002d;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-emblem {
    width: 42px;
    height: 42px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    clip-path: polygon(12% 0%, 88% 0%, 100% 50%, 88% 100%, 12% 100%, 0% 50%);
  }
  .logo-text {
    font-family: 'Teko';
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }
  .logo-text span { color: var(--red); }
  .header-badge {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 4px 12px;
    opacity: .85;
  }

  /* ─── TABS ─── */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Teko';
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 16px 22px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-btn.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }

  /* ─── MAIN ─── */
  main {
    padding: 28px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── SECTION TITLE ─── */
  .section-title {
    font-family: 'Teko';
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border2), transparent);
  }
  .section-title .marker {
    width: 4px;
    height: 24px;
    background: var(--red);
    flex-shrink: 0;
  }

  /* ─── STANDINGS TABLE ─── */
  .standings-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .standings-table th {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    text-transform: uppercase;
  }
  .standings-table th.num { text-align: right; }
  .standings-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .standings-table td.num {
    text-align: right;
    font-family: 'IBM Plex Mono';
    font-size: 13px;
  }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: var(--surface2); }
  .standings-table tr.rcb-row td {
    background: var(--red-dim);
  }
  .standings-table tr.rcb-row:hover td {
    background: rgba(232,0,45,.18);
  }
  .standings-table tr.rcb-row td:first-child {
    border-left: 3px solid var(--red);
  }

  .pos-num {
    font-family: 'Teko';
    font-size: 18px;
    font-weight: 600;
    color: var(--muted);
    width: 28px;
    display: inline-block;
    text-align: center;
  }
  .pos-num.top4 { color: var(--green); }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-abbr {
    font-family: 'Teko';
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .team-abbr.rcb-name { color: var(--red); font-size: 17px; }
  .team-full {
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
  }

  .nrr-val {
    font-family: 'IBM Plex Mono';
    font-size: 13px;
  }
  .nrr-pos { color: var(--green); }
  .nrr-neg { color: var(--loss); }

  .playoff-badge {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid;
  }
  .badge-q { color: var(--green); border-color: var(--green); background: var(--green-dim); }
  .badge-e { color: var(--loss); border-color: var(--loss); background: var(--red-dim); opacity: .7; }

  .pts-bold {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 700;
  }
  .pts-rcb { color: var(--red); }

  /* ─── LEGEND ─── */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }
  .legend-bar {
    width: 14px;
    height: 3px;
  }

  /* ─── SCHEDULE ─── */
  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 100px 1fr auto 1fr 150px;
    align-items: center;
    gap: 16px;
    transition: border-color .2s;
  }
  .match-card:hover { border-color: var(--border2); }
  .match-card.rcb-home {
    border-left: 3px solid var(--red);
  }
  .match-card.rcb-away {
    border-left: 3px solid var(--gold);
  }

  .match-date {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .match-date .day {
    font-family: 'Teko';
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: block;
  }

  .match-team {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .match-team-name {
    font-family: 'Teko';
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    line-height: 1;
  }
  .match-team-name.rcb { color: var(--red); }
  .match-team-full {
    font-size: 12px;
    color: var(--muted);
  }

  .match-vs {
    font-family: 'Teko';
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    letter-spacing: 2px;
  }

  .match-away .match-team { align-items: flex-end; text-align: right; }

  .match-info {
    text-align: right;
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.6;
  }
  .match-status {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    display: inline-block;
  }
  .status-upcoming { color: var(--blue); border: 1px solid rgba(59,130,246,.4); background: var(--blue-dim); }
  .status-result-win { color: var(--green); border: 1px solid rgba(34,197,94,.4); background: var(--green-dim); }
  .status-result-loss { color: var(--loss); border: 1px solid rgba(232,0,45,.4); background: var(--red-dim); }
  .status-live {
    color: var(--red);
    border: 1px solid var(--red);
    background: var(--red-dim);
    animation: blink 1.4s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.5;} }

  .match-result-score {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    display: block;
  }

  /* ─── SQUAD ─── */
  .role-section { margin-bottom: 32px; }
  .role-title {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .role-title .role-dot {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
  }
  .role-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 13px;
    transition: border-color .18s, background .18s;
    cursor: default;
  }
  .player-card:hover { border-color: var(--border2); background: var(--surface2); }

  .player-num {
    font-family: 'Teko';
    font-size: 22px;
    font-weight: 700;
    color: var(--border2);
    min-width: 28px;
    text-align: center;
    line-height: 1;
  }

  .player-info { min-width: 0; }
  .player-name {
    font-family: 'Rajdhani';
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .player-tag {
    margin-left: auto;
    font-family: 'IBM Plex Mono';
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .8px;
    padding: 2px 6px;
    border: 1px solid;
    flex-shrink: 0;
    align-self: flex-start;
  }
  .tag-wpl { color: #c084fc; border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.08); }
  .tag-ov { color: var(--gold); border-color: rgba(201,168,76,.4); background: var(--gold-dim); }
  .tag-cap { color: var(--red); border-color: rgba(232,0,45,.5); background: var(--red-dim); }
  .tag-vc { color: var(--gold); border-color: rgba(201,168,76,.6); background: var(--gold-dim); }

  /* Role color dots (section headers) */
  .dot-bat  { background: var(--green); }
  .dot-bowl { background: var(--red); }
  .dot-ar   { background: var(--blue); }
  .dot-wk   { background: var(--grey); }

  /* Form-based card coloring */
  .card-elite { border-left: 3px solid var(--green); }
  .card-good  { border-left: 3px solid var(--blue); }
  .card-avg   { border-left: 3px solid var(--grey); }
  .card-poor  { border-left: 3px solid var(--red); }

  .card-elite .player-num { color: rgba(34,197,94,.5); }
  .card-good  .player-num { color: rgba(59,130,246,.5); }
  .card-avg   .player-num { color: var(--border2); }
  .card-poor  .player-num { color: rgba(232,0,45,.5); }

  .form-score {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: .5px;
  }
  .form-score.elite { color: var(--green); }
  .form-score.good  { color: var(--blue); }
  .form-score.avg   { color: var(--muted); }
  .form-score.poor  { color: var(--loss); }

  .form-key-stat {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── LOADING / ERROR ─── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 14px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .error-box {
    background: var(--red-dim);
    border: 1px solid rgba(232,0,45,.3);
    padding: 16px 20px;
    color: var(--loss);
    font-family: 'Rajdhani';
    font-size: 14px;
  }

  /* ─── MOBILE BOTTOM NAV ─── */
  .bottom-nav { display: none; }
  @media (max-width: 680px) {
    #desktop-tabs { display: none; }
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      height: 58px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bnav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Teko';
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: color .15s;
    }
    .bnav-btn svg { width: 18px; height: 18px; }
    .bnav-btn.active { color: var(--red); }
    main { padding-bottom: 72px; }

    .match-card {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      gap: 10px;
    }
    .match-away { text-align: left; }
    .match-away .match-team { align-items: flex-start; }
    .match-info { text-align: left; }
    .match-vs { text-align: left; }

    .players-grid { grid-template-columns: 1fr 1fr; }

    header { padding: 0 14px; height: 56px; }
    .logo-text { font-size: 24px; }
    .logo-emblem { width: 36px; height: 36px; font-size: 17px; }
    main { padding: 16px 14px; }
  }

  /* ─── HOME HERO ─── */
  .standings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .rcb-position-banner {
    background: var(--red-dim);
    border: 1px solid rgba(232,0,45,.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .rcb-pos-num {
    font-family: 'Teko';
    font-size: 52px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }
  .rcb-pos-label {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .rcb-pos-stat {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .rcb-pos-stat span { color: var(--red); }
  .rcb-pos-sep {
    width: 1px;
    height: 40px;
    background: var(--border2);
    flex-shrink: 0;
  }

  .last-updated {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }

  /* ─── DIGITAL PAVILION THEME OVERRIDE ─── */
  :root {
    --bg: #f7faf7;
    --surface: #ffffff;
    --surface2: #f1f4f1;
    --surface3: #ecefec;
    --border: rgba(113,121,113,.16);
    --border2: rgba(0,48,22,.18);
    --red: #b6171e;
    --red-dim: rgba(182,23,30,.1);
    --red-glow: rgba(182,23,30,.18);
    --gold: #caa45d;
    --gold-dim: rgba(202,164,93,.16);
    --green: #003016;
    --green-dim: rgba(0,48,22,.08);
    --blue: #1a472a;
    --blue-dim: rgba(26,71,42,.1);
    --grey: #717971;
    --grey-dim: rgba(113,121,113,.12);
    --text: #181c1b;
    --muted: #414942;
    --win: #003016;
    --loss: #b6171e;
  }

  body {
    background:
      radial-gradient(circle at 12% -10%, rgba(202,164,93,.16), transparent 30%),
      linear-gradient(180deg, #f7faf7 0%, #eef1ee 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0;
  }

  header {
    height: 72px;
    padding: 0 28px;
    background: rgba(247,250,247,.82);
    border: 0;
    backdrop-filter: blur(22px);
    box-shadow: 0 1px 0 rgba(0,0,0,.04);
  }
  .logo-wrap { gap: 10px; }
  .logo-emblem {
    width: 36px;
    height: 36px;
    background: var(--green);
    border-radius: 12px;
    clip-path: none;
    font-family: 'Manrope';
    font-size: 12px;
    letter-spacing: .6px;
  }
  .logo-text {
    color: var(--green);
    font-family: 'Manrope';
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .logo-text span { color: var(--green); }
  .header-badge {
    border: 0;
    border-radius: 999px;
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Inter';
    font-size: 10px;
    letter-spacing: 1.8px;
    padding: 8px 12px;
  }

  .tabs {
    background: transparent;
    border: 0;
    justify-content: center;
    padding: 10px 24px 4px;
  }
  .tab-btn {
    color: var(--muted);
    font-family: 'Inter';
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.6px;
    padding: 12px 18px;
    border: 0;
    border-radius: 999px;
  }
  .tab-btn:hover:not(.active) {
    background: var(--surface2);
    color: var(--green);
  }
  .tab-btn.active {
    background: var(--green);
    color: #fff;
  }

  main {
    max-width: 1040px;
    padding: 32px 20px 108px;
  }

  .section-title {
    color: var(--text);
    font-family: 'Manrope';
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1.2px;
    margin: 34px 0 20px;
    display: block;
  }
  .section-title::before {
    content: 'IPL 2026';
    display: block;
    color: var(--red);
    font-family: 'Inter';
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 5px;
  }
  .section-title::after,
  .section-title .marker { display: none; }

  .rcb-position-banner {
    position: relative;
    overflow: hidden;
    min-height: 300px;
    align-items: flex-end;
    justify-content: flex-start;
    gap: 28px;
    padding: 30px;
    margin-bottom: 36px;
    border: 0;
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(0,48,22,.12), rgba(0,48,22,.96)),
      linear-gradient(115deg, #003016, #1a472a 55%, #003016);
    color: #fff;
    box-shadow: 0 18px 42px rgba(0,48,22,.12);
  }
  .rcb-position-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
      radial-gradient(circle at 80% 15%, rgba(255,255,255,.18), transparent 22%);
    background-size: 42px 42px, auto;

// ─── CACHE HELPERS ───────────────────────────────────────
function cacheSet(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {}
}
function cacheGet(key, ttl = CACHE_TTL) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttl) return null;
    return data;
  } catch(e) { return null; }
}

// ─── API FETCH WRAPPER ───────────────────────────────────
async function apiFetch(endpoint, params = {}) {
  const qs = new URLSearchParams({ apikey: API_KEY, ...params }).toString();
  const url = `${BASE}/${endpoint}?${qs}`;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.status === 'failure') throw new Error(json.reason || 'API error');
    return json;
  } finally {
    clearTimeout(timeout);
  }
}

async function cricbuzzFetch(path) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(`${CRICBUZZ_BASE}/${path.replace(/^\/+/, '')}`, {
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'x-rapidapi-host': CRICBUZZ_HOST,
        'x-rapidapi-key': RAPIDAPI_KEY,
      },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.message) throw new Error(json.message);
    return json;
  } finally {
    clearTimeout(timeout);
  }
}

  return short === 'RCB' ||

         name.includes('bangalore');

function roleBucket(role = '') {
  const value = role.toLowerCase();
  if (value.includes('wk')) return 'wicketKeepers';
  if (value.includes('allrounder')) return 'allRounders';
  if (value.includes('bowl')) return 'bowlers';
  return 'batters';
}

function roleCode(role = '') {
  const bucket = roleBucket(role);
  if (bucket === 'bowlers') return 'bowl';
  if (bucket === 'allRounders') return 'ar';
  return 'bat';
}

function buildLiveSquad(players) {
  const squad = { batters: [], wicketKeepers: [], allRounders: [], bowlers: [] };
  players.forEach((player, index) => {
    const key = normName(player.name);
    const meta = PLAYER_META[key] || {};
    const bucket = roleBucket(player.role);
    const detail = [
      player.role,
      player.battingStyle?.replace(' Bat', ''),
      player.bowlingStyle,
    ].filter(Boolean).join(' · ');

    squad[bucket].push({
      num: meta.num || index + 1,
      name: player.name,
      nat: meta.nat || '—',
      tag: meta.tag,
      role: roleCode(player.role),
      detail,
      source: 'api',
    });
  });
  return squad;
}

// ═══════════════════════════════════════════════════════
// PERFORMANCE FORMULA
// score 0–100. Thresholds: Elite≥75, Good≥55, Avg≥35, Poor<35
// ═══════════════════════════════════════════════════════
function calcFormScore(role, stats) {
  if (!stats) return null;

  if (role === 'bat') {
    const sr  = stats.strikeRate  || stats.sr  || 0;
    const avg = stats.avg         || stats.average || 0;
    const b   = stats.boundary_pct || 0;
    const imp = stats.impact      || 0; // (50s + 2*100s) / innings
    const srScore  = Math.min((sr  / 150) * 40, 48);
    const avgScore = Math.min((avg / 35 ) * 35, 44);
    const bndScore = Math.min((b   / 40 ) * 15, 18);
    const impScore = Math.min((imp / 0.3) * 10, 12);
    return Math.round(srScore + avgScore + bndScore + impScore);
  }
  if (role === 'bowl') {
    const econ = stats.economy   || stats.econ || 12;
    const avg  = stats.bowling_avg || stats.bowl_avg || 50;
    const wpm  = stats.wkts_per_match || stats.wpm || 0;
    const dot  = stats.dot_pct   || 0;
    const econScore = Math.max(0, Math.min(((8.5 - econ) / 3) * 20 + 20, 36));
    const avgScore  = Math.max(0, Math.min(((28  - avg)  / 15) * 25 + 25, 40));
    const wktScore  = Math.min(wpm  * 10,   18);
    const dotScore  = Math.min((dot / 40) * 15, 18);
    return Math.round(econScore + avgScore + wktScore + dotScore);
  }
  if (role === 'ar') {
    const batScore = calcFormScore('bat', {
      sr: stats.batSr || stats.strikeRate || 0,
      avg: stats.batAvg || stats.avg || 0,
      boundary_pct: stats.boundary_pct || 0,
      impact: stats.impact || 0,
    });
    const bowlScore = calcFormScore('bowl', {
      economy: stats.bowlEcon || stats.economy || 12,
      bowling_avg: stats.bowlAvg || stats.bowling_avg || 50,
      wkts_per_match: stats.wktsPerMatch || stats.wkts_per_match || 0,
      dot_pct: stats.dot_pct || 0,
    });
    return Math.round((batScore + bowlScore) / 2);
  }
  return null;
}

function formTier(score) {
  if (score === null || score === undefined) return 'unknown';
  if (score >= 75) return 'elite';
  if (score >= 55) return 'good';
  if (score >= 35) return 'avg';
  return 'poor';
}
function formLabel(score) {
  const t = formTier(score);
  return { elite:'ELITE', good:'GOOD', avg:'AVG', poor:'POOR', unknown:'—' }[t];
}

// API: FETCH RCB SCHEDULE
// Endpoint: /series_cricscorecard filtered to RCB matches
// ═══════════════════════════════════════════════════════
async function fetchSchedule() {
  const cacheKey = 'rcb_schedule_v2';
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  try {
    // Get all matches for the IPL series
    const data = await apiFetch('series_matches', { id: IPL_SERIES_ID, offset: 0 });
    const matches = data.data || [];

    // Filter to RCB matches only
    const rcbMatches = matches.filter(m => {
      const teams = [m.teams?.[0] || '', m.teams?.[1] || ''];
      return teams.some(t => t.toLowerCase().includes('royal challengers') ||
                             t.toLowerCase().includes('rcb') ||
                             t.toLowerCase().includes('bangalore') ||
                             t.toLowerCase().includes('bengaluru'));
    });

    const result = rcbMatches.map(m => {
      const teams = m.teams || [];
      const isRCB0 = (teams[0] || '').toLowerCase().includes('royal') ||
                     (teams[0] || '').toLowerCase().includes('bangalore') ||
                     (teams[0] || '').toLowerCase().includes('bengaluru');
      const rcbTeam  = isRCB0 ? teams[0] : teams[1];
      const oppTeam  = isRCB0 ? teams[1] : teams[0];

      const dt = m.dateTimeGMT ? new Date(m.dateTimeGMT) : null;
      const dateStr = dt ? dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—';
      const dayStr  = dt ? dt.toLocaleDateString('en-GB', { weekday:'short' }).toUpperCase() : '';

      // Determine home/away by venue name
      const isHome = (m.venue || '').toLowerCase().includes('chinnaswamy') ||
                     (m.venue || '').toLowerCase().includes('bengaluru') ||
                     (m.venue || '').toLowerCase().includes('bangalore');

      // Result
      let result = null;
      let score  = '';
      if (m.matchEnded || m.status?.toLowerCase().includes('won')) {
        const won = (m.status || '').toLowerCase().includes('royal challengers') ||
                    (m.status || '').toLowerCase().includes('rcb');
        result = won ? 'W' : 'L';
        score  = m.status || '';
      }

      // Shorten opposition name to abbreviation
      const oppAbbr = oppTeam
        .replace(/Royal Challengers.*/, 'RCB')
        .replace(/Mumbai Indians.*/, 'MI')
        .replace(/Chennai Super Kings.*/, 'CSK')
        .replace(/Kolkata Knight Riders.*/, 'KKR')
        .replace(/Sunrisers Hyderabad.*/, 'SRH')
        .replace(/Rajasthan Royals.*/, 'RR')
        .replace(/Punjab Kings.*/, 'PBKS')
        .replace(/Delhi Capitals.*/, 'DC')
        .replace(/Gujarat Titans.*/, 'GT')
        .replace(/Lucknow Super Giants.*/, 'LSG')
        .replace(/\s+\w+$/, '') // fallback: keep first 4 chars
        .slice(0, 4).toUpperCase();

      return {
        date: dateStr,
        day:  dayStr,
        opp:  oppAbbr,
        oppFull: oppTeam,
        venue: m.venue || '',
        home:  isHome,
        result,
        score,
        time: dt ? dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' }) + ' IST' : '',
        live: !m.matchEnded && m.matchStarted,
        raw: m,
      };
    });

    // Sort by date
    result.sort((a, b) => {
      const da = a.raw.dateTimeGMT ? new Date(a.raw.dateTimeGMT) : 0;
      const db = b.raw.dateTimeGMT ? new Date(b.raw.dateTimeGMT) : 0;
      return da - db;
    });

    cacheSet(cacheKey, result);
    return result;
  } catch(e) {
    console.warn('Schedule fetch failed:', e);
    return null;
  }
}

function flattenSquadPlayers(squad) {
  return [
    ...(squad.batters || []),
    ...(squad.wicketKeepers || []),
    ...(squad.allRounders || []),
    ...(squad.bowlers || []),
  ];
}

function resolveSquadKey(scorecardName, squadNames) {
  const exact = normName(scorecardName);
  if (CRICBUZZ_NAME_ALIASES[exact]) return CRICBUZZ_NAME_ALIASES[exact];
  if (squadNames.some(name => normName(name) === exact)) return exact;

  const incomingTokens = nameTokens(scorecardName);
  if (!incomingTokens.length) return exact;

  const matches = squadNames.filter(name => {
    const squadTokens = nameTokens(name);
    return incomingTokens.every(token => squadTokens.includes(token));
  });

  return matches.length === 1 ? normName(matches[0]) : exact;
}

function oversToBalls(overs) {
  const value = String(overs || '0');
  const [whole, balls = '0'] = value.split('.');
  return (parseInt(whole, 10) || 0) * 6 + (parseInt(balls, 10) || 0);
}

function addMatchId(target, matchId) {
  if (!target._matchIds) target._matchIds = new Set();
  target._matchIds.add(matchId);
}

function finalizeCricbuzzStats(statsMap) {
  Object.keys(statsMap).forEach(key => {
    if (key.startsWith('_')) return;
    const rec = statsMap[key];

    if (rec.bat) {
      const b = rec.bat;
      b.apps = b._matchIds?.size || b.apps || 0;
      b.sr = b.balls > 0 ? (b.runs / b.balls) * 100 : 0;
      b.avg = b.outs > 0 ? b.runs / b.outs : b.runs;
      b.boundary_pct = b.runs > 0 ? ((b.fours * 4 + b.sixes * 6) / b.runs) * 100 : 0;
      delete b._matchIds;
      delete b.outs;
      delete b.balls;
      delete b.fours;
      delete b.sixes;
    }

    if (rec.bowl) {
      const b = rec.bowl;
      b.apps = b._matchIds?.size || b.apps || 0;
      b.matches = b.apps;
      b.econ = b.balls > 0 ? b.runs / (b.balls / 6) : 12;
      b.bowling_avg = b.wickets > 0 ? b.runs / b.wickets : b.runs || 50;
      b.wkts_per_match = b.apps > 0 ? b.wickets / b.apps : 0;
      b.dot_pct = 0;
      delete b._matchIds;
      delete b.balls;
      delete b.runs;
    }
  });
}

async function fetchCricbuzzRecentRcbStats(squad) {
  const cacheKey = 'cricbuzz_rcb_recent_stats_v2';
  const cached = cacheGet(cacheKey, DAILY_CACHE_TTL);
  if (cached) return cached;

  const squadNames = flattenSquadPlayers(squad).map(p => p.name);
  const statsMap = {};

  const recent = await cricbuzzFetch('matches/v1/recent');
  const wrappers = (recent.typeMatches || [])
    .flatMap(type => type.seriesMatches || [])
    .map(series => series.seriesAdWrapper)
    .filter(Boolean);

  const rcbMatchIds = wrappers
    .filter(series => series.seriesId === 9241 || /indian premier league 2026/i.test(series.seriesName || ''))
    .flatMap(series => series.matches || [])
    .map(match => match.matchInfo)
    .filter(info => {
      const teams = [info?.team1?.teamSName, info?.team2?.teamSName, info?.team1?.teamName, info?.team2?.teamName]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
      return info?.state === 'Complete' && (teams.includes('rcb') || teams.includes('royal challengers'));
    })
    .map(info => info.matchId)
    .slice(0, 3);

  for (const matchId of rcbMatchIds) {
    const data = await cricbuzzFetch(`mcenter/v1/${matchId}/hscard`);
    (data.scorecard || []).forEach(innings => {
      if ((innings.batteamsname || '').toUpperCase() === 'RCB') {
        (innings.batsman || []).forEach(player => {
          const key = resolveSquadKey(player.name || player.nickname, squadNames);
          if (!statsMap[key]) statsMap[key] = {};
          if (!statsMap[key].bat) {
            statsMap[key].bat = { apps: 0, runs: 0, balls: 0, fours: 0, sixes: 0, fifties: 0, hundreds: 0, innings: 0, outs: 0 };
          }
          const bat = statsMap[key].bat;
          bat.runs += parseInt(player.runs || 0, 10);
          bat.balls += parseInt(player.balls || 0, 10);
          bat.fours += parseInt(player.fours || 0, 10);
          bat.sixes += parseInt(player.sixes || 0, 10);
          bat.innings += 1;
          if ((parseInt(player.runs || 0, 10)) >= 100) bat.hundreds += 1;
          else if ((parseInt(player.runs || 0, 10)) >= 50) bat.fifties += 1;
          if (player.outdec && !/not out/i.test(player.outdec)) bat.outs += 1;
          addMatchId(bat, matchId);
        });
      }

      const bowlingTeamIsRcb = (innings.batteamsname || '').toUpperCase() !== 'RCB';
      if (bowlingTeamIsRcb) {
        (innings.bowler || []).forEach(player => {
          const key = resolveSquadKey(player.name || player.nickname, squadNames);
          if (!squadNames.some(name => normName(name) === key || normName(name) === normName(player.name))) return;
          if (!statsMap[key]) statsMap[key] = {};
          if (!statsMap[key].bowl) {
            statsMap[key].bowl = { apps: 0, wickets: 0, balls: 0, runs: 0 };
          }
          const bowl = statsMap[key].bowl;
          bowl.wickets += parseInt(player.wickets || 0, 10);
          bowl.runs += parseInt(player.runs || 0, 10);
          bowl.balls += oversToBalls(player.overs);
          addMatchId(bowl, matchId);
        });
      }
    });
  }

  finalizeCricbuzzStats(statsMap);
  statsMap._hasCricbuzzStats = Object.keys(statsMap).some(key => !key.startsWith('_'));
  statsMap._cricbuzzMatches = rcbMatchIds.length;
  cacheSet(cacheKey, statsMap);
  return statsMap;
}

// ═══════════════════════════════════════════════════════
// API: FETCH PLAYER STATS (IPL 2026 season)
// Uses /series_squad for the live player list.
// Series batting/bowling endpoints are optional and may be unavailable on free API keys.
// Returns a map: playerName -> { apps, stats }, plus _squad when live squad loads.
// ═══════════════════════════════════════════════════════
async function fetchSquadStats() {
  const cacheKey = 'rcb_squad_stats_v5';
  const cached = cacheGet(cacheKey, DAILY_CACHE_TTL);
  if (cached) return cached;

  const statsMap = buildEstimatedSquadStats(RCB_SQUAD_BASE);

  try {
    // Fetch series squad to get player IDs in this series
    const squadData = await apiFetch('series_squad', { id: IPL_SERIES_ID });
    const squads = squadData.data || [];

    // Find RCB squad entry
    const rcbSquadEntry = squads.find(isRCBTeam);

    if (!rcbSquadEntry) throw new Error('RCB squad not found');

    const players = rcbSquadEntry.players || [];
    statsMap._squad = buildLiveSquad(players);
    statsMap._hasLiveSquad = true;
  } catch(e) {
    console.warn('Live squad fetch failed:', e.message);
  }

  try {
    // Fetch stats for each player (batters: batting stats; bowlers: bowling stats)
    // To save API calls, we fetch the series batting + bowling leaderboards once
    const [batData, bowlData] = await Promise.all([
      apiFetch('series_batting', { id: IPL_SERIES_ID, offset: 0 }).catch(() => ({ data: [] })),
      apiFetch('series_bowling', { id: IPL_SERIES_ID, offset: 0 }).catch(() => ({ data: [] })),
    ]);

    const batStats  = batData.data  || [];
    const bowlStats = bowlData.data || [];

    // Index by player name (normalized)
    batStats.forEach(p => {
      const key = normName(p.name);
      if (!statsMap[key]) statsMap[key] = {};
      statsMap[key].bat = {
        apps:        parseInt(p.mat || p.innings || 0),
        sr:          parseFloat(p.sr || p.strikeRate || 0),
        avg:         parseFloat(p.avg || p.average  || 0),
        runs:        parseInt(p.runs || 0),
        fifties:     parseInt(p['50s'] || p.fifties || 0),
        hundreds:    parseInt(p['100s'] || p.hundreds || 0),
        innings:     parseInt(p.inns || p.innings || 0),
        boundary_pct: parseFloat(p.boundary_pct || 0),
      };
    });

    bowlStats.forEach(p => {
      const key = normName(p.name);
      if (!statsMap[key]) statsMap[key] = {};
      statsMap[key].bowl = {
        apps:           parseInt(p.mat || p.innings || 0),
        econ:           parseFloat(p.eco || p.economy || 12),
        bowling_avg:    parseFloat(p.avg || p.average || 50),
        wickets:        parseInt(p.wkts || p.wickets || 0),
        matches:        parseInt(p.mat || 1),
        dot_pct:        parseFloat(p.dot_pct || 0),
      };
      if (statsMap[key].bowl.matches > 0) {
        statsMap[key].bowl.wkts_per_match =
          statsMap[key].bowl.wickets / statsMap[key].bowl.matches;
      }
    });

  } catch(e) {
    console.warn('CricketData series stats fetch failed:', e.message);
  }

  try {
    const cricbuzzStats = await fetchCricbuzzRecentRcbStats(statsMap._squad || RCB_SQUAD_BASE);
    Object.keys(cricbuzzStats || {}).forEach(key => {
      if (key.startsWith('_')) {
        statsMap[key] = cricbuzzStats[key];
        return;
      }
      if (!statsMap[key]) statsMap[key] = {};
      if (cricbuzzStats[key].bat) statsMap[key].bat = cricbuzzStats[key].bat;
      if (cricbuzzStats[key].bowl) statsMap[key].bowl = cricbuzzStats[key].bowl;
    });
  } catch(e) {
    console.warn('Cricbuzz recent stats fetch failed:', e.message);
  }

  cacheSet(cacheKey, statsMap);
  return statsMap;
}

// RENDER: SQUAD
// ═══════════════════════════════════════════════════════
function renderSquadContent(statsMap = {}) {
  const el = document.getElementById('squad-content');
  const squad = statsMap._squad || RCB_SQUAD_BASE;
  const isLiveSquad = !!statsMap._hasLiveSquad;
  const hasLiveStats = Object.keys(statsMap).some(key => !key.startsWith('_') && (statsMap[key].bat || statsMap[key].bowl));

  // Merge API stats into base squad
  function enrichPlayers(players) {
    return players.map(p => {
      const key  = normName(p.name);
      const data = statsMap[key] || {};

      // Determine stats + apps based on role
      let stats = null, apps = 0, keystat = '—';

      if (p.role === 'bat') {
        const b = data.bat;
        if (b) {
          apps    = b.apps;
          stats   = { ...b, impact: ((b.fifties||0) + 2*(b.hundreds||0)) / Math.max(b.innings||1, 1) };
          keystat = `SR ${b.sr?.toFixed(0)||'?'} · Avg ${b.avg?.toFixed(1)||'?'}`;
        }
      } else if (p.role === 'bowl') {
        const b = data.bowl;
        if (b) {
          apps    = b.apps;
          stats   = b;
          keystat = `${b.wkts_per_match?.toFixed(1)||'?'} wkt/m · Econ ${b.econ?.toFixed(1)||'?'}`;
        }
      } else if (p.role === 'ar') {
        const bat  = data.bat;
        const bowl = data.bowl;
        apps = Math.max(bat?.apps||0, bowl?.apps||0);
        if (bat || bowl) {
          stats = {
            batSr:         bat?.sr         || 0,
            batAvg:        bat?.avg        || 0,
            boundary_pct:  bat?.boundary_pct||0,
            impact:        bat ? ((bat.fifties||0)+2*(bat.hundreds||0))/Math.max(bat.innings||1,1) : 0,
            bowlEcon:      bowl?.econ      || 12,
            bowlAvg:       bowl?.bowling_avg|| 50,
            wktsPerMatch:  bowl?.wkts_per_match||0,
            dot_pct:       bowl?.dot_pct   || 0,
          };
          const bStr  = bat  ? `${bat.avg?.toFixed(1)||'?'} avg`  : '';
          const boStr = bowl ? `${bowl.econ?.toFixed(1)||'?'} econ` : '';
          keystat = [bStr, boStr].filter(Boolean).join(' · ');
        }
      }

      const score = stats ? calcFormScore(p.role, stats) : null;
      return { ...p, apps: apps || 0, stats, score, keystat };
    });
  }

  function buildSection(title, players, dotClass) {
    const enriched = enrichPlayers(players)
      .sort((a, b) => (b.apps - a.apps) || ((b.score||0) - (a.score||0)));

    let html = `
      <div class="role-section">
        <div class="role-title"><div class="role-dot ${dotClass}"></div>${title}</div>
        <div class="players-grid">`;

    enriched.forEach(p => {
      const tier   = formTier(p.score);
      const label  = p.source === 'api' && !p.stats ? 'LISTED' : formLabel(p.score);
      let tagHTML  = '';
      if (p.tag === 'CAP') tagHTML = `<span class="player-tag tag-cap">C</span>`;
      else if (p.tag === 'VC') tagHTML = `<span class="player-tag tag-vc">VC</span>`;
      else if (p.tag === 'OV') tagHTML = `<span class="player-tag tag-ov">OV</span>`;

      const appsStr = p.apps > 0 ? `${p.apps}G` : (p.source === 'api' ? 'SQUAD' : 'DNP');
      const keyStat = p.keystat !== '—' ? p.keystat : (p.detail || `${p.nat || '—'} · ${p.role.toUpperCase()}`);

      html += `
        <div class="player-card card-${tier}">
          <div class="player-num">${p.num}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="form-key-stat">${keyStat}</div>
            <div class="form-score ${tier}">${label} · ${appsStr}</div>
          </div>
          ${tagHTML}
        </div>`;
    });

    html += `</div></div>`;
    return html;
  }

  const dataLabel = statsMap._hasCricbuzzStats
    ? `<div class="last-updated" style="color:var(--green);margin-bottom:20px;">RECENT MATCH STATS · ${statsMap._cricbuzzMatches || 0} CRICBUZZ SCORECARDS</div>`
    : statsMap._hasEstimatedStats
      ? `<div class="last-updated" style="color:var(--gold);margin-bottom:20px;">ESTIMATED STATS · API UNAVAILABLE — DATA IS APPROXIMATE</div>`
    : hasLiveStats
      ? `<div class="last-updated" style="color:var(--green);margin-bottom:20px;">LIVE STATS · UPDATES DAILY</div>`
    : isLiveSquad
      ? `<div class="last-updated" style="color:var(--green);margin-bottom:20px;">LIVE SQUAD · PLAYER STATS UNAVAILABLE ON THIS API KEY</div>`
    : `<div class="last-updated" style="color:var(--gold);margin-bottom:20px;">ESTIMATED STATS · API UNAVAILABLE — DATA IS APPROXIMATE</div>`;

  let html = `
    <div class="section-title"><div class="marker"></div>RCB SQUAD · IPL 2026</div>
    ${dataLabel}
    <div class="legend" style="margin-bottom:24px;">
      <div class="legend-item"><div class="legend-bar" style="background:#003016"></div>Elite (75+)</div>
      <div class="legend-item"><div class="legend-bar" style="background:#2f7d4b"></div>Good (55–74)</div>
      <div class="legend-item"><div class="legend-bar" style="background:#8c968d"></div>Average (35–54)</div>
      <div class="legend-item"><div class="legend-bar" style="background:#b6171e"></div>Poor (&lt;35)</div>
      <div class="legend-item" style="font-size:12px;color:var(--muted);margin-left:8px;">↓ sorted by appearances</div>
    </div>`;

  html += buildSection('BATTERS',         squad.batters,       'dot-bat');
  html += buildSection('WICKET-KEEPERS',  squad.wicketKeepers, 'dot-wk');
  html += buildSection('ALL-ROUNDERS',    squad.allRounders,   'dot-ar');
  html += buildSection('BOWLERS',         squad.bowlers,       'dot-bowl');

  html += `<div class="last-updated" style="margin-top:8px;">
    FORMULA: Batters = SR(40) + Avg(35) + Boundary%(15) + Impact(10) ·
    Bowlers = Economy(36) + Avg(40) + Wkts/match(18) + Dot%(18) ·
    All-rounders = 50/50 blend
  </div>`;

  el.innerHTML = html;
}

async function renderSquad() {
  renderSquadContent();

  const statsMap = await fetchSquadStats().catch(e => {
    console.warn('Live squad fetch failed:', e.message);
    return {};
  });

  if (statsMap._hasLiveSquad || Object.keys(statsMap).some(key => !key.startsWith('_'))) {
    renderSquadContent(statsMap);
  }
}
