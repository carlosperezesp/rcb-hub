<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCB Fan Hub · IPL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0b;
    --surface:  #141416;
    --surface2: #1c1c1f;
    --border:   #2a2a2f;
    --border2:  #3a3a42;
    --red:      #e8002d;
    --red-dim:  rgba(232,0,45,.12);
    --red-glow: rgba(232,0,45,.35);
    --gold:     #c9a84c;
    --gold-dim: rgba(201,168,76,.12);
    --green:    #22c55e;
    --green-dim:rgba(34,197,94,.13);
    --blue:     #3b82f6;
    --blue-dim: rgba(59,130,246,.13);
    --grey:     #64748b;
    --grey-dim: rgba(100,116,139,.13);
    --text:     #f1f0ed;
    --muted:    #6b7280;
    --win:      #22c55e;
    --loss:     #e8002d;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-emblem {
    width: 42px;
    height: 42px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    clip-path: polygon(12% 0%, 88% 0%, 100% 50%, 88% 100%, 12% 100%, 0% 50%);
  }
  .logo-text {
    font-family: 'Teko';
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }
  .logo-text span { color: var(--red); }
  .header-badge {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 4px 12px;
    opacity: .85;
  }

  /* ─── TABS ─── */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Teko';
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 16px 22px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-btn.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }

  /* ─── MAIN ─── */
  main {
    padding: 28px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── SECTION TITLE ─── */
  .section-title {
    font-family: 'Teko';
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border2), transparent);
  }
  .section-title .marker {
    width: 4px;
    height: 24px;
    background: var(--red);
    flex-shrink: 0;
  }

  /* ─── STANDINGS TABLE ─── */
  .standings-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .standings-table th {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    text-transform: uppercase;
  }
  .standings-table th.num { text-align: right; }
  .standings-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .standings-table td.num {
    text-align: right;
    font-family: 'IBM Plex Mono';
    font-size: 13px;
  }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: var(--surface2); }
  .standings-table tr.rcb-row td {
    background: var(--red-dim);
  }
  .standings-table tr.rcb-row:hover td {
    background: rgba(232,0,45,.18);
  }
  .standings-table tr.rcb-row td:first-child {
    border-left: 3px solid var(--red);
  }

  .pos-num {
    font-family: 'Teko';
    font-size: 18px;
    font-weight: 600;
    color: var(--muted);
    width: 28px;
    display: inline-block;
    text-align: center;
  }
  .pos-num.top4 { color: var(--green); }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-abbr {
    font-family: 'Teko';
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .team-abbr.rcb-name { color: var(--red); font-size: 17px; }
  .team-full {
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
  }

  .nrr-val {
    font-family: 'IBM Plex Mono';
    font-size: 13px;
  }
  .nrr-pos { color: var(--green); }
  .nrr-neg { color: var(--loss); }

  .playoff-badge {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid;
  }
  .badge-q { color: var(--green); border-color: var(--green); background: var(--green-dim); }
  .badge-e { color: var(--loss); border-color: var(--loss); background: var(--red-dim); opacity: .7; }

  .pts-bold {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 700;
  }
  .pts-rcb { color: var(--red); }

  /* ─── LEGEND ─── */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }
  .legend-bar {
    width: 14px;
    height: 3px;
  }

  /* ─── SCHEDULE ─── */
  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 100px 1fr auto 1fr 150px;
    align-items: center;
    gap: 16px;
    transition: border-color .2s;
  }
  .match-card:hover { border-color: var(--border2); }
  .match-card.rcb-home {
    border-left: 3px solid var(--red);
  }
  .match-card.rcb-away {
    border-left: 3px solid var(--gold);
  }

  .match-date {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .match-date .day {
    font-family: 'Teko';
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: block;
  }

  .match-team {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .match-team-name {
    font-family: 'Teko';
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    line-height: 1;
  }
  .match-team-name.rcb { color: var(--red); }
  .match-team-full {
    font-size: 12px;
    color: var(--muted);
  }

  .match-vs {
    font-family: 'Teko';
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    letter-spacing: 2px;
  }

  .match-away .match-team { align-items: flex-end; text-align: right; }

  .match-info {
    text-align: right;
    font-family: 'Rajdhani';
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.6;
  }
  .match-status {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    display: inline-block;
  }
  .status-upcoming { color: var(--blue); border: 1px solid rgba(59,130,246,.4); background: var(--blue-dim); }
  .status-result-win { color: var(--green); border: 1px solid rgba(34,197,94,.4); background: var(--green-dim); }
  .status-result-loss { color: var(--loss); border: 1px solid rgba(232,0,45,.4); background: var(--red-dim); }
  .status-live {
    color: var(--red);
    border: 1px solid var(--red);
    background: var(--red-dim);
    animation: blink 1.4s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.5;} }

  .match-result-score {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    display: block;
  }

  /* ─── SQUAD ─── */
  .role-section { margin-bottom: 32px; }
  .role-title {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .role-title .role-dot {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
  }
  .role-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 13px;
    transition: border-color .18s, background .18s;
    cursor: default;
  }
  .player-card:hover { border-color: var(--border2); background: var(--surface2); }

  .player-num {
    font-family: 'Teko';
    font-size: 22px;
    font-weight: 700;
    color: var(--border2);
    min-width: 28px;
    text-align: center;
    line-height: 1;
  }

  .player-info { min-width: 0; }
  .player-name {
    font-family: 'Rajdhani';
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .player-tag {
    margin-left: auto;
    font-family: 'IBM Plex Mono';
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .8px;
    padding: 2px 6px;
    border: 1px solid;
    flex-shrink: 0;
    align-self: flex-start;
  }
  .tag-wpl { color: #c084fc; border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.08); }
  .tag-ov { color: var(--gold); border-color: rgba(201,168,76,.4); background: var(--gold-dim); }
  .tag-cap { color: var(--red); border-color: rgba(232,0,45,.5); background: var(--red-dim); }
  .tag-vc { color: var(--gold); border-color: rgba(201,168,76,.6); background: var(--gold-dim); }

  /* Role color dots (section headers) */
  .dot-bat  { background: var(--green); }
  .dot-bowl { background: var(--red); }
  .dot-ar   { background: var(--blue); }
  .dot-wk   { background: var(--grey); }

  /* Form-based card coloring */
  .card-elite { border-left: 3px solid var(--green); }
  .card-good  { border-left: 3px solid var(--blue); }
  .card-avg   { border-left: 3px solid var(--grey); }
  .card-poor  { border-left: 3px solid var(--red); }

  .card-elite .player-num { color: rgba(34,197,94,.5); }
  .card-good  .player-num { color: rgba(59,130,246,.5); }
  .card-avg   .player-num { color: var(--border2); }
  .card-poor  .player-num { color: rgba(232,0,45,.5); }

  .form-score {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: .5px;
  }
  .form-score.elite { color: var(--green); }
  .form-score.good  { color: var(--blue); }
  .form-score.avg   { color: var(--muted); }
  .form-score.poor  { color: var(--loss); }

  .form-key-stat {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── LOADING / ERROR ─── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 14px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .error-box {
    background: var(--red-dim);
    border: 1px solid rgba(232,0,45,.3);
    padding: 16px 20px;
    color: var(--loss);
    font-family: 'Rajdhani';
    font-size: 14px;
  }

  /* ─── MOBILE BOTTOM NAV ─── */
  .bottom-nav { display: none; }
  @media (max-width: 680px) {
    #desktop-tabs { display: none; }
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      height: 58px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bnav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Teko';
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: color .15s;
    }
    .bnav-btn svg { width: 18px; height: 18px; }
    .bnav-btn.active { color: var(--red); }
    main { padding-bottom: 72px; }

    .match-card {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      gap: 10px;
    }
    .match-away { text-align: left; }
    .match-away .match-team { align-items: flex-start; }
    .match-info { text-align: left; }
    .match-vs { text-align: left; }

    .players-grid { grid-template-columns: 1fr 1fr; }

    header { padding: 0 14px; height: 56px; }
    .logo-text { font-size: 24px; }
    .logo-emblem { width: 36px; height: 36px; font-size: 17px; }
    main { padding: 16px 14px; }
  }

  /* ─── HOME HERO ─── */
  .standings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .rcb-position-banner {
    background: var(--red-dim);
    border: 1px solid rgba(232,0,45,.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .rcb-pos-num {
    font-family: 'Teko';
    font-size: 52px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }
  .rcb-pos-label {
    font-family: 'IBM Plex Mono';
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .rcb-pos-stat {
    font-family: 'Teko';
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .rcb-pos-stat span { color: var(--red); }
  .rcb-pos-sep {
    width: 1px;
    height: 40px;
    background: var(--border2);
    flex-shrink: 0;
  }

  .last-updated {
    font-family: 'IBM Plex Mono';
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-emblem">RCB</div>
    <div>
      <div class="logo-text"><span>RCB</span> FAN HUB</div>
    </div>
  </div>
  <div class="header-badge">IPL 2026</div>
</header>

<div class="tabs" id="desktop-tabs">
  <button class="tab-btn active" onclick="switchTab('home')">HOME</button>
  <button class="tab-btn" onclick="switchTab('schedule')">SCHEDULE</button>
  <button class="tab-btn" onclick="switchTab('squad')">SQUAD</button>
</div>

<main>

  <!-- HOME: IPL Standings -->
  <div id="tab-home" class="tab-panel active">
    <div id="standings-content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">LOADING STANDINGS...</div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE: RCB matches -->
  <div id="tab-schedule" class="tab-panel">
    <div id="schedule-content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">LOADING SCHEDULE...</div>
      </div>
    </div>
  </div>

  <!-- SQUAD: RCB players -->
  <div id="tab-squad" class="tab-panel">
    <div id="squad-content"></div>
  </div>

</main>

<!-- Mobile bottom nav -->
<nav class="bottom-nav">
  <button class="bnav-btn active" onclick="switchTab('home')" id="bnav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
    HOME
  </button>
  <button class="bnav-btn" onclick="switchTab('schedule')" id="bnav-schedule">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    SCHEDULE
  </button>
  <button class="bnav-btn" onclick="switchTab('squad')" id="bnav-squad">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    SQUAD
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════
// RCB FAN HUB — cricketdata.org API integration
// API: https://api.cricapi.com/v1/
// Docs: https://cricketdata.org
// Cache: localStorage, 30-min TTL (to stay well within 100 calls/day)
// ═══════════════════════════════════════════════════════

const API_KEY  = '081aca27-a3d0-4ce7-aded-a1f73624ce37';
const BASE     = 'https://api.cricapi.com/v1';
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes in ms

// IDs for IPL 2026 — discovered at runtime via seriesSquad/series search
// RCB team id in cricapi: will be resolved dynamically
const IPL_SERIES_ID = 'd5a498c8-7596-4b93-8ab0-e0efc3345312'; // IPL 2026

// Cricapi player IDs for RCB squad 2026
const RCB_PLAYER_IDS = {
  'Virat Kohli':      '11265cf9-5aed-4b53-aa72-ef8ad7572e45',
  'Rajat Patidar':    '3f449b5c-4f6a-4b34-876e-2b3843b376cb',
  'Phil Salt':        'b264b9b8-17f7-4b67-adca-9c67c0d78c4d',
  'Devdutt Padikkal': '8c8f2e6a-1e1f-4ae5-aaab-7a99f6a2e2ac',
  'Liam Livingstone': 'f39a87ad-4d05-4db5-a315-c6c67b20ce6b',

// ─── CACHE HELPERS ───────────────────────────────────────
function cacheSet(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {}
}
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return data;
  } catch(e) { return null; }
}

// ─── API FETCH WRAPPER ───────────────────────────────────
async function apiFetch(endpoint, params = {}) {
  const qs = new URLSearchParams({ apikey: API_KEY, ...params }).toString();
  const url = `${BASE}/${endpoint}?${qs}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.status === 'failure') throw new Error(json.reason || 'API error');
  return json;
}

}

// ═══════════════════════════════════════════════════════
// PERFORMANCE FORMULA
// score 0–100. Thresholds: Elite≥75, Good≥55, Avg≥35, Poor<35
// ═══════════════════════════════════════════════════════
function calcFormScore(role, stats) {
  if (!stats) return null;

  if (role === 'bat') {
    const sr  = stats.strikeRate  || stats.sr  || 0;
    const avg = stats.avg         || stats.average || 0;
    const b   = stats.boundary_pct || 0;
    const imp = stats.impact      || 0; // (50s + 2*100s) / innings
    const srScore  = Math.min((sr  / 150) * 40, 48);
    const avgScore = Math.min((avg / 35 ) * 35, 44);
    const bndScore = Math.min((b   / 40 ) * 15, 18);
    const impScore = Math.min((imp / 0.3) * 10, 12);
    return Math.round(srScore + avgScore + bndScore + impScore);
  }
  if (role === 'bowl') {
    const econ = stats.economy   || stats.econ || 12;
    const avg  = stats.bowling_avg || stats.bowl_avg || 50;
    const wpm  = stats.wkts_per_match || stats.wpm || 0;
    const dot  = stats.dot_pct   || 0;
    const econScore = Math.max(0, Math.min(((8.5 - econ) / 3) * 20 + 20, 36));
    const avgScore  = Math.max(0, Math.min(((28  - avg)  / 15) * 25 + 25, 40));
    const wktScore  = Math.min(wpm  * 10,   18);
    const dotScore  = Math.min((dot / 40) * 15, 18);
    return Math.round(econScore + avgScore + wktScore + dotScore);
  }
  if (role === 'ar') {
    const batScore = calcFormScore('bat', {
      sr: stats.batSr || stats.strikeRate || 0,
      avg: stats.batAvg || stats.avg || 0,
      boundary_pct: stats.boundary_pct || 0,
      impact: stats.impact || 0,
    });
    const bowlScore = calcFormScore('bowl', {
      economy: stats.bowlEcon || stats.economy || 12,
      bowling_avg: stats.bowlAvg || stats.bowling_avg || 50,
      wkts_per_match: stats.wktsPerMatch || stats.wkts_per_match || 0,
      dot_pct: stats.dot_pct || 0,
    });
    return Math.round((batScore + bowlScore) / 2);
  }
  return null;
}

function formTier(score) {
  if (score === null || score === undefined) return 'unknown';
  if (score >= 75) return 'elite';
  if (score >= 55) return 'good';
  if (score >= 35) return 'avg';
  return 'poor';
}
function formLabel(score) {
  const t = formTier(score);
  return { elite:'ELITE', good:'GOOD', avg:'AVG', poor:'POOR', unknown:'—' }[t];
}

// API: FETCH IPL STANDINGS
// Endpoint: /series_points_table  (series id for IPL 2026)
// Fallback: search currentMatches for IPL and extract standings
// ═══════════════════════════════════════════════════════
async function fetchStandings() {
  const cacheKey = 'rcb_standings_v2';
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  // Try points table via series id
  try {
    const data = await apiFetch('series_points_table', { id: IPL_SERIES_ID });
    if (data.data && data.data.pointsTable) {
      const table = data.data.pointsTable[0]?.teamPoints || [];
      const result = table.map((t, i) => ({
        pos:  i + 1,
        abbr: t.teamSName || t.teamName?.slice(0,4).toUpperCase() || '???',
        full: t.teamName  || '',
        m:    parseInt(t.matchesPlayed || 0),
        w:    parseInt(t.win  || 0),
        l:    parseInt(t.loss || 0),
        pts:  parseInt(t.points || 0),
        nrr:  parseFloat(t.nrr || 0),
        rcb:  (t.teamSName || '').toUpperCase() === 'RCB',
      }));
      cacheSet(cacheKey, result);
      return result;
    }
  } catch(e) {}

  // Fallback: currentMatches with IPL series filter
  try {
    const data = await apiFetch('series', { search: 'Indian Premier League 2026', offset: 0 });
    const series = (data.data || []).find(s =>
      s.name?.includes('Indian Premier League') && s.name?.includes('2026')
    );
    if (series) {
      const pts = await apiFetch('series_points_table', { id: series.id });
      const table = pts.data?.pointsTable?.[0]?.teamPoints || [];
      const result = table.map((t, i) => ({
        pos:  i + 1,
        abbr: t.teamSName || '???',
        full: t.teamName  || '',
        m:    parseInt(t.matchesPlayed || 0),
        w:    parseInt(t.win  || 0),
        l:    parseInt(t.loss || 0),
        pts:  parseInt(t.points || 0),
        nrr:  parseFloat(t.nrr || 0),
        rcb:  (t.teamSName || '').toUpperCase() === 'RCB',
      }));
      cacheSet(cacheKey, result);
      return result;
    }
  } catch(e) {}

  return null; // triggers fallback static render
}

// ═══════════════════════════════════════════════════════
// API: FETCH RCB SCHEDULE
// Endpoint: /series_cricscorecard filtered to RCB matches
// ═══════════════════════════════════════════════════════
async function fetchSchedule() {
  const cacheKey = 'rcb_schedule_v2';
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  try {
    // Get all matches for the IPL series
    const data = await apiFetch('series_matches', { id: IPL_SERIES_ID, offset: 0 });
    const matches = data.data || [];

    // Filter to RCB matches only
    const rcbMatches = matches.filter(m => {
      const teams = [m.teams?.[0] || '', m.teams?.[1] || ''];
      return teams.some(t => t.toLowerCase().includes('royal challengers') ||
                             t.toLowerCase().includes('rcb') ||
                             t.toLowerCase().includes('bangalore') ||
                             t.toLowerCase().includes('bengaluru'));
    });

    const result = rcbMatches.map(m => {
      const teams = m.teams || [];
      const isRCB0 = (teams[0] || '').toLowerCase().includes('royal') ||
                     (teams[0] || '').toLowerCase().includes('bangalore') ||
                     (teams[0] || '').toLowerCase().includes('bengaluru');
      const rcbTeam  = isRCB0 ? teams[0] : teams[1];
      const oppTeam  = isRCB0 ? teams[1] : teams[0];

      const dt = m.dateTimeGMT ? new Date(m.dateTimeGMT) : null;
      const dateStr = dt ? dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—';
      const dayStr  = dt ? dt.toLocaleDateString('en-GB', { weekday:'short' }).toUpperCase() : '';

      // Determine home/away by venue name
      const isHome = (m.venue || '').toLowerCase().includes('chinnaswamy') ||
                     (m.venue || '').toLowerCase().includes('bengaluru') ||
                     (m.venue || '').toLowerCase().includes('bangalore');

      // Result
      let result = null;
      let score  = '';
      if (m.matchEnded || m.status?.toLowerCase().includes('won')) {
        const won = (m.status || '').toLowerCase().includes('royal challengers') ||
                    (m.status || '').toLowerCase().includes('rcb');
        result = won ? 'W' : 'L';
        score  = m.status || '';
      }

      // Shorten opposition name to abbreviation
      const oppAbbr = oppTeam
        .replace(/Royal Challengers.*/, 'RCB')
        .replace(/Mumbai Indians.*/, 'MI')
        .replace(/Chennai Super Kings.*/, 'CSK')
        .replace(/Kolkata Knight Riders.*/, 'KKR')
        .replace(/Sunrisers Hyderabad.*/, 'SRH')
        .replace(/Rajasthan Royals.*/, 'RR')
        .replace(/Punjab Kings.*/, 'PBKS')
        .replace(/Delhi Capitals.*/, 'DC')
        .replace(/Gujarat Titans.*/, 'GT')
        .replace(/Lucknow Super Giants.*/, 'LSG')
        .replace(/\s+\w+$/, '') // fallback: keep first 4 chars
        .slice(0, 4).toUpperCase();

      return {
        date: dateStr,
        day:  dayStr,
        opp:  oppAbbr,
        oppFull: oppTeam,
        venue: m.venue || '',
        home:  isHome,
        result,
        score,
        time: dt ? dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' }) + ' IST' : '',
        live: !m.matchEnded && m.matchStarted,
        raw: m,
      };
    });

    // Sort by date
    result.sort((a, b) => {
      const da = a.raw.dateTimeGMT ? new Date(a.raw.dateTimeGMT) : 0;
      const db = b.raw.dateTimeGMT ? new Date(b.raw.dateTimeGMT) : 0;
      return da - db;
    });

    cacheSet(cacheKey, result);
    return result;
  } catch(e) {
    console.warn('Schedule fetch failed:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════
// API: FETCH PLAYER STATS (IPL 2026 season)
// Endpoint: /players_batting  &  /players_bowling  per series
// Returns a map: playerName -> { apps, stats }
// ═══════════════════════════════════════════════════════
async function fetchSquadStats() {
  const cacheKey = 'rcb_squad_stats_v2';
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  const statsMap = {};

  try {
    // Fetch series squad to get player IDs in this series
    const squadData = await apiFetch('series_squad', { id: IPL_SERIES_ID });
    const squads = squadData.data || [];

    // Find RCB squad entry
    const rcbSquadEntry = squads.find(s =>
      (s.teamName || '').toLowerCase().includes('royal') ||
      (s.teamName || '').toLowerCase().includes('bangalore') ||
      (s.teamName || '').toLowerCase().includes('bengaluru')
    );

    if (!rcbSquadEntry) throw new Error('RCB squad not found');

    const players = rcbSquadEntry.players || [];

    // Fetch stats for each player (batters: batting stats; bowlers: bowling stats)
    // To save API calls, we fetch the series batting + bowling leaderboards once
    const [batData, bowlData] = await Promise.all([
      apiFetch('series_batting', { id: IPL_SERIES_ID, offset: 0 }).catch(() => ({ data: [] })),
      apiFetch('series_bowling', { id: IPL_SERIES_ID, offset: 0 }).catch(() => ({ data: [] })),
    ]);

    const batStats  = batData.data  || [];
    const bowlStats = bowlData.data || [];

    // Index by player name (normalized)
    const norm = s => s?.toLowerCase().replace(/[^a-z]/g, '') || '';

    batStats.forEach(p => {
      const key = norm(p.name);
      if (!statsMap[key]) statsMap[key] = {};
      statsMap[key].bat = {
        apps:        parseInt(p.mat || p.innings || 0),
        sr:          parseFloat(p.sr || p.strikeRate || 0),
        avg:         parseFloat(p.avg || p.average  || 0),
        runs:        parseInt(p.runs || 0),
        fifties:     parseInt(p['50s'] || p.fifties || 0),
        hundreds:    parseInt(p['100s'] || p.hundreds || 0),
        innings:     parseInt(p.inns || p.innings || 0),
        boundary_pct: parseFloat(p.boundary_pct || 0),
      };
    });

    bowlStats.forEach(p => {
      const key = norm(p.name);
      if (!statsMap[key]) statsMap[key] = {};
      statsMap[key].bowl = {
        apps:           parseInt(p.mat || p.innings || 0),
        econ:           parseFloat(p.eco || p.economy || 12),
        bowling_avg:    parseFloat(p.avg || p.average || 50),
        wickets:        parseInt(p.wkts || p.wickets || 0),
        matches:        parseInt(p.mat || 1),
        dot_pct:        parseFloat(p.dot_pct || 0),
      };
      if (statsMap[key].bowl.matches > 0) {
        statsMap[key].bowl.wkts_per_match =
          statsMap[key].bowl.wickets / statsMap[key].bowl.matches;
      }
    });

    // Add player IDs from squad
    players.forEach(p => {
      const key = norm(p.name);
      if (!statsMap[key]) statsMap[key] = {};
      statsMap[key].id   = p.id;
      statsMap[key].name = p.name;
    });

    cacheSet(cacheKey, statsMap);
    return statsMap;

  } catch(e) {
    console.warn('Squad stats fetch failed:', e.message);
    return {};
  }
}

  html += `</div>`;

}

// ═══════════════════════════════════════════════════════
// RENDER: SQUAD
// ═══════════════════════════════════════════════════════
async function renderSquad() {
  const el = document.getElementById('squad-content');

  // Show loading state
  el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">LOADING SQUAD STATS...</div></div>`;

  const statsMap = await fetchSquadStats().catch(() => ({}));
  const norm = s => s?.toLowerCase().replace(/[^a-z]/g, '') || '';
  const isLive = Object.keys(statsMap).length > 0;

  // Merge API stats into base squad
  function enrichPlayers(players) {
    return players.map(p => {
      const key  = norm(p.name);
      const data = statsMap[key] || {};

      // Determine stats + apps based on role
      let stats = null, apps = 0, keystat = '—';

      if (p.role === 'bat') {
        const b = data.bat;
        if (b) {
          apps    = b.apps;
          stats   = { ...b, impact: ((b.fifties||0) + 2*(b.hundreds||0)) / Math.max(b.innings||1, 1) };
          keystat = `SR ${b.sr?.toFixed(0)||'?'} · Avg ${b.avg?.toFixed(1)||'?'}`;
        }
      } else if (p.role === 'bowl') {
        const b = data.bowl;
        if (b) {
          apps    = b.apps;
          stats   = b;
          keystat = `${b.wkts_per_match?.toFixed(1)||'?'} wkt/m · Econ ${b.econ?.toFixed(1)||'?'}`;
        }
      } else if (p.role === 'ar') {
        const bat  = data.bat;
        const bowl = data.bowl;
        apps = Math.max(bat?.apps||0, bowl?.apps||0);
        if (bat || bowl) {
          stats = {
            batSr:         bat?.sr         || 0,
            batAvg:        bat?.avg        || 0,
            boundary_pct:  bat?.boundary_pct||0,
            impact:        bat ? ((bat.fifties||0)+2*(bat.hundreds||0))/Math.max(bat.innings||1,1) : 0,
            bowlEcon:      bowl?.econ      || 12,
            bowlAvg:       bowl?.bowling_avg|| 50,
            wktsPerMatch:  bowl?.wkts_per_match||0,
            dot_pct:       bowl?.dot_pct   || 0,
          };
          const bStr  = bat  ? `${bat.avg?.toFixed(1)||'?'} avg`  : '';
          const boStr = bowl ? `${bowl.econ?.toFixed(1)||'?'} econ` : '';
          keystat = [bStr, boStr].filter(Boolean).join(' · ');
        }
      }

      const score = stats ? calcFormScore(p.role, stats) : null;
      return { ...p, apps: apps || 0, stats, score, keystat };
    });
  }

  function buildSection(title, players, dotClass) {
    const enriched = enrichPlayers(players)
      .sort((a, b) => (b.apps - a.apps) || ((b.score||0) - (a.score||0)));

    let html = `
      <div class="role-section">
        <div class="role-title"><div class="role-dot ${dotClass}"></div>${title}</div>
        <div class="players-grid">`;

    enriched.forEach(p => {
      const tier   = formTier(p.score);
      const label  = formLabel(p.score);
      let tagHTML  = '';
      if (p.tag === 'CAP') tagHTML = `<span class="player-tag tag-cap">C</span>`;
      else if (p.tag === 'VC') tagHTML = `<span class="player-tag tag-vc">VC</span>`;
      else if (p.tag === 'OV') tagHTML = `<span class="player-tag tag-ov">OV</span>`;

      const appsStr = p.apps > 0 ? `${p.apps}G` : 'DNP';

      html += `
        <div class="player-card card-${tier}">
          <div class="player-num">${p.num}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="form-key-stat">${p.keystat}</div>
            <div class="form-score ${tier}">${label} · ${appsStr}</div>
          </div>
          ${tagHTML}
        </div>`;
    });

    html += `</div></div>`;
    return html;
  }

  const dataLabel = isLive
    ? `<div class="last-updated" style="color:var(--green);margin-bottom:20px;">LIVE STATS · UPDATES EVERY 30 MIN</div>`
    : `<div class="last-updated" style="color:var(--gold);margin-bottom:20px;">ESTIMATED STATS · API UNAVAILABLE — DATA IS APPROXIMATE</div>`;

  let html = `
    <div class="section-title"><div class="marker"></div>RCB SQUAD · IPL 2026</div>
    ${dataLabel}
    <div class="legend" style="margin-bottom:24px;">
      <div class="legend-item"><div class="legend-bar" style="background:var(--green)"></div>Elite (75+)</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--blue)"></div>Good (55–74)</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--grey)"></div>Average (35–54)</div>
      <div class="legend-item"><div class="legend-bar" style="background:var(--red)"></div>Poor (&lt;35)</div>
      <div class="legend-item" style="font-size:12px;color:var(--muted);margin-left:8px;">↓ sorted by appearances</div>
    </div>`;

  html += buildSection('BATTERS',         RCB_SQUAD_BASE.batters,       'dot-bat');
  html += buildSection('WICKET-KEEPERS',  RCB_SQUAD_BASE.wicketKeepers, 'dot-wk');
  html += buildSection('ALL-ROUNDERS',    RCB_SQUAD_BASE.allRounders,   'dot-ar');
  html += buildSection('BOWLERS',         RCB_SQUAD_BASE.bowlers,       'dot-bowl');

  html += `<div class="last-updated" style="margin-top:8px;">
    FORMULA: Batters = SR(40) + Avg(35) + Boundary%(15) + Impact(10) ·
    Bowlers = Economy(36) + Avg(40) + Wkts/match(18) + Dot%(18) ·
    All-rounders = 50/50 blend
  </div>`;

  el.innerHTML = html;
}
